<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unique Responsive Header</title>
    <style>
        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            background: #f5f5f5;
        }

        header {
            background: linear-gradient(135deg, #232526, #414345);
            color: #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 30px;
        }

        .logo {
            font-size: 1.6em;
            font-weight: 600;
            letter-spacing: 1px;
            color: #00bcd4;
            cursor: pointer;
            transition: 0.3s;
        }

        .logo:hover {
            color: #fff;
        }

        /* --- Navbar Links --- */
        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: #ddd;
            text-decoration: none;
            font-size: 0.95em;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #00bcd4;
        }

        /* --- Search Box --- */
        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 4px 10px;
            transition: 0.3s;
        }

        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            color: #fff;
            padding: 5px;
            width: 90px;
            transition: width 0.3s;
        }

        .search-box input:focus {
            width: 150px;
        }

        .search-box button {
            background: transparent;
            border: none;
            color: #00bcd4;
            cursor: pointer;
            font-size: 1em;
        }

        /* --- Auth Buttons --- */
        .auth-buttons button {
            background: #00bcd4;
            border: none;
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: 0.3s;
        }

        .auth-buttons button:hover {
            background: #0288a7;
        }

        /* --- Hamburger --- */
        .hamburger {
            display: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #00bcd4;
        }

        /* --- Mobile Menu --- */
        @media (max-width: 768px) {
            .nav {
                flex-wrap: wrap;
                padding: 12px 20px;
            }

            .nav-links,
            .auth-buttons {
                display: none;
                width: 100%;
                flex-direction: column;
                align-items: center;
                gap: 15px;
                margin-top: 10px;
                background: rgba(0, 0, 0, 0.4);
                padding: 15px 0;
                border-radius: 10px;
                animation: fadeIn 0.3s ease;
            }

            .nav.active .nav-links,
            .nav.active .auth-buttons {
                display: flex;
            }

            .hamburger {
                display: block;
            }

            .search-box {
                flex: 1;
                margin: 10px 0;
                justify-content: center;
            }

            .search-box input {
                width: 120px;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(-10px);
                }

                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        }
    </style>
</head>

<body>

    <header>
        <nav class="nav">
            <div class="logo">HAPROVEN</div>

            <div class="search-box">
                <input type="search" placeholder="Search">
                <button>🔍</button>
            </div>

            <div class="hamburger" onclick="toggleMenu()">☰</div>

            <div class="nav-links">
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Services</a>
                <a href="#">Contact</a>
            </div>

            <div class="auth-buttons">
                <button>Login</button>
                <button style="background:#444;">Logout</button>
            </div>
        </nav>
    </header>

    <script>
        function toggleMenu() {
            document.querySelector('.nav').classList.toggle('active');
        }
    </script>



    <footer class="footer-a">

        <div class="foot-wrap">

            <div class="f-col">
                <h2>BrandName</h2>
                <p>Creative digital solutions for your business.</p>
            </div>

            <div class="f-col">
                <h3>Explore</h3>
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Pricing</a>
                <a href="#">Blog</a>
            </div>

            <div class="f-col">
                <h3>Support</h3>
                <a href="#">Help Center</a>
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Service</a>
            </div>

            <div class="f-col">
                <h3>Subscribe</h3>
                <input type="email" placeholder="Enter email…" />
                <button>Join</button>
            </div>

        </div>

        <p class="copy">© 2025 BrandName. All rights reserved.</p>
    </footer>

    <style>
        .footer-a {
            background: linear-gradient(135deg, #141414, #1e1e1e);
            color: #d9d9d9;
            padding: 60px 30px;
            font-family: "Poppins", sans-serif;
        }

        .foot-wrap {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1.2fr;
            gap: 40px;
        }

        .f-col h2,
        .f-col h3 {
            color: white;
        }

        .f-col a {
            display: block;
            color: #bfbfbf;
            margin: 6px 0;
            text-decoration: none;
            transition: 0.3s;
        }

        .f-col a:hover {
            color: #fff;
            transform: translateX(5px);
        }

        .f-col input {
            width: 100%;
            padding: 10px 12px;
            border: none;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .f-col button {
            padding: 10px 15px;
            border: none;
            width: 100%;
            background: #fff;
            color: #000;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .f-col button:hover {
            background: #00aaff;
            color: #fff;
        }

        .copy {
            text-align: center;
            margin-top: 40px;
            color: #aaa;
        }

        @media (max-width: 900px) {
            .foot-wrap {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 500px) {
            .foot-wrap {
                grid-template-columns: 1fr;
            }
        }
    </style>

</body>

</html>
