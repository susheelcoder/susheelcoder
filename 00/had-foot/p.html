<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Contact Section</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* === 
        GLOBAL VARIABLES 
        === */
        :root {
            --primary: #0f72ff;
            --primary-light: #3b82f6;
            --secondary: #8b5cf6;
            --dark: #1e293b;
            --light: #f8fafc;
            --muted: #64748b;
            --card: #ffffff;
            --bg: #f8fafc;
            --text: #1e293b;
            --radius: 12px;
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            --gradient: linear-gradient(135deg, var(--primary), var(--secondary));
            --container: 1200px;
        }

        /* === SIMPLE CONTACT SECTION === */
        .contact-simple {
            max-width: var(--container);
            margin: 0 auto;
            padding: 60px 20px;
        }

        .contact-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .contact-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--text);
        }

        .contact-subtitle {
            font-size: 1.1rem;
            color: var(--muted);
            max-width: 600px;
            margin: 0 auto;
        }

        .contact-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        /* Contact Info */
        .contact-info-simple {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .contact-item-simple {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            transition: transform 0.3s ease;
        }

        .contact-item-simple:hover {
            transform: translateY(-5px);
        }

        .contact-icon-simple {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient);
            color: white;
            border-radius: 10px;
            font-size: 1.2rem;
        }

        .contact-details-simple h4 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--text);
        }

        .contact-details-simple p {
            color: var(--muted);
            margin: 0;
        }

        .contact-link-simple {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .contact-link-simple:hover {
            color: var(--secondary);
        }

        /* Simple Form */
        .contact-form-simple {
            background: var(--card);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .form-group-simple {
            margin-bottom: 20px;
        }

        .form-label-simple {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text);
        }

        .form-input-simple,
        .form-textarea-simple {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            background: var(--light);
        }

        .form-input-simple:focus,
        .form-textarea-simple:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-textarea-simple {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn-simple {
            width: 100%;
            padding: 14px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .submit-btn-simple:hover {
            transform: translateY(-2px);
        }

        /* Social Links */
        .social-simple {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 40px;
        }

        .social-simple a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-simple a:hover {
            background: var(--secondary);
            transform: translateY(-3px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .contact-content {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            
            .contact-title {
                font-size: 2rem;
            }
            
            .contact-form-simple {
                padding: 25px;
            }
        }

        @media (max-width: 480px) {
            .contact-simple {
                padding: 40px 15px;
            }
            
            .contact-item-simple {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <section class="contact-simple">
        <div class="contact-header">
            <h2 class="contact-title">Get In Touch</h2>
            <p class="contact-subtitle">Have a project in mind? Let's work together to make it happen.</p>
        </div>

        <div class="contact-content">
            <!-- Contact Information -->
            <div class="contact-info-simple">
                <div class="contact-item-simple">
                    <div class="contact-icon-simple">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div class="contact-details-simple">
                        <h4>Email</h4>
                        <p>susheelcoder@example.com</p>
                        <a href="mailto:susheelcoder@example.com" class="contact-link-simple">Send Email</a>
                    </div>
                </div>

                <div class="contact-item-simple">
                    <div class="contact-icon-simple">
                        <i class="fas fa-phone"></i>
                    </div>
                    <div class="contact-details-simple">
                        <h4>Phone</h4>
                        <p>+91 98765 43210</p>
                        <a href="tel:+919876543210" class="contact-link-simple">Call Now</a>
                    </div>
                </div>

                <div class="contact-item-simple">
                    <div class="contact-icon-simple">
                        <i class="fas fa-map-marker-alt"></i>
                    </div>
                    <div class="contact-details-simple">
                        <h4>Location</h4>
                        <p>Noida, Uttar Pradesh</p>
                        <p>India</p>
                    </div>
                </div>

                <div class="contact-item-simple">
                    <div class="contact-icon-simple">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div class="contact-details-simple">
                        <h4>Working Hours</h4>
                        <p>Monday - Friday</p>
                        <p>10:00 AM - 6:00 PM</p>
                    </div>
                </div>
            </div>

            <!-- Contact Form -->
            <div class="contact-form-simple">
                <form id="contactFormSimple">
                    <div class="form-group-simple">
                        <label for="name" class="form-label-simple">Your Name</label>
                        <input type="text" id="name" class="form-input-simple" placeholder="Enter your name" required>
                    </div>

                    <div class="form-group-simple">
                        <label for="email" class="form-label-simple">Email Address</label>
                        <input type="email" id="email" class="form-input-simple" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group-simple">
                        <label for="subject" class="form-label-simple">Subject</label>
                        <input type="text" id="subject" class="form-input-simple" placeholder="Enter subject" required>
                    </div>

                    <div class="form-group-simple">
                        <label for="message" class="form-label-simple">Message</label>
                        <textarea id="message" class="form-textarea-simple" placeholder="Tell me about your project..." required></textarea>
                    </div>

                    <button type="submit" class="submit-btn-simple">
                        Send Message
                    </button>
                </form>
            </div>
        </div>

        <!-- Social Links -->
        <div class="social-simple">
            <a href="#" aria-label="GitHub">
                <i class="fab fa-github"></i>
            </a>
            <a href="#" aria-label="LinkedIn">
                <i class="fab fa-linkedin"></i>
            </a>
            <a href="#" aria-label="Twitter">
                <i class="fab fa-twitter"></i>
            </a>
            <a href="#" aria-label="Instagram">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
    </section>

    <script>
        // Simple form handling
        document.getElementById('contactFormSimple').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const subject = document.getElementById('subject').value;
            const message = document.getElementById('message').value;
            
            console.log('Form submitted:', { name, email, subject, message });
            
            alert(`Thank you ${name}! Your message has been sent.`);
            this.reset();
        });
    </script>
</body>
</html>
