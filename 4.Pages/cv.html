<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My CV</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #6c6666;
        }


        .back {
            position: fixed;
            top: 15px;
            left: 20px;
            padding: 8px 20px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            z-index: 100;
        }

        .Download {
            position: fixed;
            top: 15px;
            left: 120px;
            padding: 8px 20px;
            background: #f591c4;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            z-index: 100;
        }

        button:hover {
            background-color: #6c6666;
            color: #4CAF50;
        }

        a:hover {
            background-color: #6c6666;
            color: #4CAF50;
        }

        div {
            background-color: #6c6d6c;
            display: flex;
            flex-direction: row;
            justify-content: space-around;
        }

        @media (min-width:750px) {
            img {
                height: 100vh;
            }
        }


        @media (max-width:750px) {
            body {
                background-color: #aaaaaa;
            }

            img {
                width: 100%;
            }

            section {
                background-color: #f591c4;
                height: 10%;
            }

            div {
                background-color: antiquewhite;
                /* height: 90%; */
            }

        }
    </style>
</head>

<body>
    <section>
        <a href="/" class="back">← Back</a>
        <a href="/1.IMG/cv/CV Susheel.jpg" download>
            <button class="Download">⬇️ Download</button>
        </a>
    </section>
    <!-- <iframe src="/1.IMG/b.jpg"></iframe> -->

    <div>
        <img src="/1.IMG/cv/CV Susheel.jpg" alt="">
    </div>


    <script src="/2.JS/Silent Blocker.js"></script>

</body>

</html>
