<body>
    <!-- Nav -->
    <nav>
        <label class="mode">
            <i class="fas fa-sun"></i>
            <input id="toggle" type="checkbox">
            <span class="toggle-circle"></span>
        </label>
    </nav>

    <!-- Home -->
    <section id="home">
        <h1>Custom</h1>
        <h2>Welcome</h2>
    </section>
</body>

<style>
    :root {
        --bg: rgba(0, 0, 0, 0.4);
        --font: aliceblue;
        --btn: rgb(255, 92, 92);
    }

    [data-theme='dark'] {
        --bg: rgba(0, 0, 0, 1);
        --font: #da3afa;
        --btn: rgb(150, 64, 255);
    }

    body {
        background: var(--bg);
        color: var(--font);
        font-family: 'Comfortaa';
        text-align: center;
    }

    h1 {
        font-size: 100px;
        font-family: Kaushan Script;
    }

    h2 {
        font-size: 40px;
    }

    nav {
        display: flex;
        justify-content: flex-end;
        padding: 15px;
    }

    .mode {
        display: flex;
        align-items: center;
    }

    input {
        display: none;
    }

    .toggle-circle {
        width: 60px;
        height: 30px;
        border: 1px solid black;
        border-radius: 30px;
        position: relative;
        transition: .4s;
    }

    .toggle-circle::before {
        content: '';
        position: absolute;
        left: 0;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: aliceblue;
        transition: .4s;
    }

    input:checked+span::before {
        left: 30px;
    }
</style>




<script>
    document.getElementById('toggle').addEventListener('change', e => {
        e.target.checked
            ? document.documentElement.setAttribute('data-theme', 'dark')
            : document.documentElement.removeAttribute('data-theme');
    });
</script>
