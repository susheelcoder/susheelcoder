


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SusheelCoder - Hex Logo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial Black', sans-serif;
        }

        .logo-section {
            text-align: center;
            padding: 30px;
            animation: sectionFade 1s ease-out;
        }

        /* SVG लोगो स्टाइल */
        .logo-mark {
            width: 180px;
            height: 180px;
            margin: 0 auto 30px;
            filter: drop-shadow(0 0 30px #4facfe);
            animation: logoFloat 3s ease-in-out infinite;
            cursor: pointer;
        }

        /* हेक्सागन स्टाइल */
        .hex {
            fill: none;
            stroke: url(#gradient);
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            animation: hexGlow 2s infinite, hexRotate 10s linear infinite;
            transform-origin: center;
        }

        /* कोड ब्रैकेट्स */
        .code {
            fill: none;
            stroke: #4facfe;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            animation: codePulse 1.5s infinite;
        }

        /* स्लैश (कमेंट सिंबल) */
        .slash {
            fill: none;
            stroke: #ff6b6b;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-dasharray: 5 5;
            animation: slashMove 2s linear infinite;
        }

        /* ग्रेडिएंट डेफिनिशन */
        .gradient-defs {
            position: absolute;
            width: 0;
            height: 0;
        }

        /* ब्रांड नाम - लेटर एनिमेशन */
        .logo {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 20px;
            perspective: 500px;
        }

        .logo span {
            font-size: 36px;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 15px #4facfe,
                        0 0 30px #ff6b6b;
            display: inline-block;
            animation: letterWave 2s ease-in-out infinite;
            cursor: default;
            transition: all 0.3s ease;
        }

        /* हर लेटर के लिए अलग-अलग एनिमेशन डिले */
        .logo span:nth-child(1) { animation-delay: 0.0s; }
        .logo span:nth-child(2) { animation-delay: 0.1s; }
        .logo span:nth-child(3) { animation-delay: 0.2s; }
        .logo span:nth-child(4) { animation-delay: 0.3s; }
        .logo span:nth-child(5) { animation-delay: 0.4s; }
        .logo span:nth-child(6) { animation-delay: 0.5s; }
        .logo span:nth-child(7) { animation-delay: 0.6s; }
        .logo span:nth-child(8) { animation-delay: 0.7s; }
        .logo span:nth-child(9) { animation-delay: 0.8s; }
        .logo span:nth-child(10) { animation-delay: 0.9s; }
        .logo span:nth-child(11) { animation-delay: 1.0s; }
        .logo span:nth-child(12) { animation-delay: 1.1s; }

        /* कीफ्रेम एनिमेशन */
        @keyframes sectionFade {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes logoFloat {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
                filter: drop-shadow(0 0 50px #4facfe);
            }
        }

        @keyframes hexGlow {
            0%, 100% {
                stroke: #4facfe;
                filter: drop-shadow(0 0 10px #4facfe);
            }
            50% {
                stroke: #ff6b6b;
                filter: drop-shadow(0 0 20px #ff6b6b);
            }
        }

        @keyframes hexRotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes codePulse {
            0%, 100% {
                stroke: #4facfe;
                stroke-width: 4;
            }
            50% {
                stroke: #ff6b6b;
                stroke-width: 6;
            }
        }

        @keyframes slashMove {
            0% {
                stroke-dashoffset: 0;
                stroke: #ff6b6b;
            }
            50% {
                stroke-dashoffset: 10;
                stroke: #4facfe;
            }
            100% {
                stroke-dashoffset: 20;
                stroke: #ff6b6b;
            }
        }

        @keyframes letterWave {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
                text-shadow: 0 0 15px #4facfe;
            }
            25% {
                transform: translateY(-12px) rotate(5deg);
                text-shadow: 0 0 30px #ff6b6b, 0 0 50px #4facfe;
            }
            50% {
                transform: translateY(0) rotate(-5deg);
                text-shadow: 0 0 40px #4facfe, 0 0 70px #ff6b6b;
            }
            75% {
                transform: translateY(-8px) rotate(3deg);
                text-shadow: 0 0 25px #ff6b6b, 0 0 45px #4facfe;
            }
        }

        /* होवर इफेक्ट */
        .logo-mark:hover {
            animation: logoFloat 1s ease-in-out infinite;
        }

        .logo-mark:hover .hex {
            animation: hexGlow 1s infinite, hexRotate 3s linear infinite;
        }

        .logo-mark:hover .code {
            animation: codePulse 0.5s infinite;
        }

        .logo-mark:hover .slash {
            animation: slashMove 0.5s linear infinite;
        }

        .logo span:hover {
            transform: scale(1.4) rotate(10deg);
            color: #ff6b6b;
            text-shadow: 0 0 30px #4facfe,
                        0 0 60px #ff6b6b;
            transition: all 0.2s ease;
            z-index: 10;
        }

        /* टैगलाइन */
        .coding-tagline {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: fadeInUp 1s ease-out 1.2s forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* पार्टिकल इफेक्ट */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #4facfe;
            border-radius: 50%;
            animation: particleFloat 3s infinite;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) translateX(50px);
                opacity: 0;
            }
        }

        /* रिस्पॉन्सिव डिज़ाइन */
        @media (max-width: 500px) {
            .logo-mark {
                width: 140px;
                height: 140px;
            }
            
            .logo span {
                font-size: 28px;
            }
            
            .coding-tagline {
                font-size: 12px;
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>


    <section class="logo-section">

    <!-- CODING STYLE LOGO -->
    <svg class="logo-mark" viewBox="0 0 200 200">
        <polygon class="hex" points="100,15 175,55 175,145 100,185 25,145 25,55" />
        <polyline class="code" points="90,70 60,100 90,130" />
        <polyline class="code" points="110,70 140,100 110,130" />
        <line class="slash" x1="95" y1="70" x2="105" y2="130" />
    </svg>

    <!-- Brand Name -->
    <div class="logo">
        <span>S</span>
        <span>u</span>
        <span>s</span>
        <span>h</span>
        <span>e</span>
        <span>e</span>
        <span>l</span>
        <span>C</span>
        <span>o</span>
        <span>d</span>
        <span>e</span>
        <span>r</span>
    </div>

</section>


    <script>
        // पार्टिकल्स जेनरेट करने के लिए
        function createParticles() {
            const particles = document.querySelector('.particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // रैंडम पोजीशन
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                
                // रैंडम साइज
                const size = Math.random() * 3 + 1;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                
                // रैंडम एनिमेशन डिले
                particle.style.animationDelay = Math.random() * 2 + 's';
                
                // रैंडम कलर
                const colors = ['#4facfe', '#ff6b6b', '#ffffff'];
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                particles.appendChild(particle);
            }
        }

        createParticles();

        // हर 5 सेकंड में पार्टिकल्स रीफ्रेश
        setInterval(() => {
            const particles = document.querySelector('.particles');
            particles.innerHTML = '';
            createParticles();
        }, 5000);
    </script>
</body>
</html>
